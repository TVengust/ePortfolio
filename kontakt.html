  <!-- KONTAKT -->
  <section class="contact">

    <!-- Lijevi dio: info -->
    <div class="contact-info">
      <span class="tag uppercase">Kontakt</span>
      <h1>Javi mi se</h1>
      <p>Imaš projekt, pitanje ili priliku za suradnju? Slobodno se javi — odgovaram u roku od 24 sata.</p>

      <ul class="contact-list">
        <li>
          <span class="contact-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3.5" y="5.5" width="17" height="13" rx="1.5"/>
              <polyline points="4,7 12,13 20,7"/>
            </svg>
          </span>
          <a href="mailto:tonivengust03@gmail.com">tonivengust03@gmail.com</a>
        </li>
        <li>
          <span class="contact-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
              <circle cx="11" cy="13" r="5"/>
              <circle cx="17.2" cy="6.8" r="1.3" fill="currentColor" stroke="none"/>
            </svg>
          </span>
          <a href="https://instagram.com/tonivengust" target="_blank">tonivengust</a>
        </li>
        <li>
          <span class="contact-icon circle" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor">

    <!-- Desni dio: forma -->
    <div class="contact-form">
      <h2 class="section-label">Forma</h2>
      <form action="https://formspree.io/f/TVOJ_ID" method="POST">
        <label for="ime">Ime</label>
        <input type="text" id="ime" name="ime" required>

        <label for="prezime">Prezime</label>
        <input type="text" id="prezime" name="prezime" required>

        <label for="poruka">Poruka</label>
        <textarea id="poruka" name="poruka" rows="5" required></textarea>

        <button type="submit" class="btn btn-primary">Pošalji →</button>
      </form>
    </div>

  </section>
